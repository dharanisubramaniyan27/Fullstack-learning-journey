<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: rgb(190, 192, 8);
        }
        #a1{
            height: 600px;
            width: 400px;
            border: 1px solid black;
            position: absolute;
            top: 100px;
            left: 600px;

            background-color: white;
            border-radius: 30px;
            box-shadow: 10px 10px;
        }

        #b2 {
            height: 200px;
            width: 350px;
            border: 1px solid black;
            border-radius: 10px;

            background-image: url(https://images.unsplash.com/photo-1669023414166-a4cc7c0fe1f5?q=80&w=1332&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-repeat: no-repeat;
            background-size: cover;

            position: absolute;

            top: 23px;
            left: 23px;
        }
        #c3 {
            position: absolute;
            top: 250px;
            left: 23px;
        }

        button{
            background-color:  rgb(234, 237, 44);
            text-align: center;
            font-weight: 800;
            border-radius: 5px;
        }
        #d4{
            position: absolute;
            top: 500px;
            left: 30px;
        }
        #image{
            height: 50px;
            width: 50px;
            border-radius: 50%;
        }
        h3{
            position: absolute;
            top: 495px;
            left: 100px;
        }
        p{
            font-family:'Times New Roman', Times, serif;
            margin: 10px;
        }


    </style>
</head>
<body>

    <div id="a1">
        <div id="b2">
        </div>
        <div id="c3">
            <button>Learning</button>
            <p>Published on 04 Jul 2026</p>
            <h2>HTML & CSS Foundations</h2>
            <p>These languages act as the fundamental blueprint for every digital experience, shaping the content and design of the modern internet.</p>
        </div>
        <div id="d4">
            <img src="./Passport pic.jpeg" alt="" id="image">
        </div>
        <h3>DHARANI S</h3>
    </div>
    
</body>
</html>
