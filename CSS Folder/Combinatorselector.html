<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinator selector</title>
    <link rel="stylesheet" href="./Combinatorselector.css">
</head>
<body>
    <!--DESCENDANT SELECTOR-->
    <div>
        <p>Appa</p>
        <p>Amma</p>
        <span>
            <p>Dharani</p>
        </span>
        <span>
            <p>Subash</p>
        </span>
    </div>
    <hr>

    <!-- CHILD SELECTOR-->
     <div>
        <h1>Fenchi</h1>
        <h2>Snowfa</h2>
        <span>
            <h1>Kalvena</h1>
        </span>
        <span>
            <h1>Bhavana</h1>
        </span>
    </div>

    <!--ADJANCENT SELECTOR-->
     <div>
        <h1>Shamitha</h1>
        <p>Hema</p>
        <h2>Priya</h2>
        <p>Krishnaveni</p>
        <h1>Yazhini</h1>
        
    </div>
    <hr>

    <!--GENERAL SELECTOR-->
    <div>
        <h1>Akilesh</h1>
        <p>Snowin</p>
        <h2>Anish</h2>
        <p>Danesh</p>
        <h1>Ajay</h1>
        <h3>Gopi</h3>
        <p>Aromal</p>
    </div>
</body>
</html>
