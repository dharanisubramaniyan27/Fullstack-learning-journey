<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Props in CSS</title>
    <style>
        span{
            height: 120px;
            width: 120px;
            border:3px solid blueviolet;
        }
        img{
            height:180px;
            width:180px;
        }
        span,img,video,a,input{
            display: block;

        }

        h1{
            height:100px;
            width:100px;
            border:2px solid deeppink;
        }
        p{
            height:100px;
            width:100px;
            border:5px solid greenyellow;
        }
        h1,h2,h3,p,div{
            display: inline;
        }

        h1,h2,h3,p,div{
            display: inline-block;
        }

    </style>
</head>
<body>
    
    <!-- DISPLAY BLOCK -->
     <span>Hiii</span>
     <img src="../Html Folder/Peacock.jpg" alt="">
     <video src="../Html Folder/Vedio1.mp4" controls loop autoplay muted></video>
     <a href="https:www.pixabay.com">Pixabay</a>
     <input type="text">

     <hr>

     <!-- DISPLAY INLINE -->
    <h1>Anish</h1>
    <h2>Ajay</h2>
    <h3>Avinash</h3>
    <p>Balaji</p>
    <div>Danesh</div>

    <hr>


</body>
</html>
