<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpleselector</title>
    <style>
        #demo1
        {
            color: aqua;
            background-color: brown;
            text-align: center;
        }
        #demo2{
            color:white;
            background-color: greenyellow;
        }
        #demo3{
            color: red;
            background-color: gold;
        }
        #demo4{
            color:aquamarine;
            background-color: blueviolet;  
            color: white;
        }

        .cls
        {
            color: crimson;
            background-color: cyan;
            text-align: center;
            padding: 20px;
            border: 3px solid black;

        }

        h2{
            color: darkcyan;
            background-color: floralwhite;
            text-align: center;
        }
        h1{
            color: white;
            background-color: deeppink;
            border: 2px solid blanchedalmond;
        }

        p,h3
        {
            color: lavender;
            background-color: magenta;
            text-align: center;
            padding: 3px;
        }

        *{
            color: aliceblue;
            background-color:aqua;
        }
    </style>
</head>

<body>

    <!-- ID SELECTOR(#) -->
     <h1 id="demo1">Dharani</h1>
     <h1 id="demo2">Shamitha</h1>
     <h1 id="demo3">Fenchi</h1>
     <h1 id="demo4">Snowfaa</h1>
     <hr>

     <!-- CLASS SELECTOR(.) -->
      <h1 class="cls">Snowin</h1>
      <p class="cls">Danesh</p>
      <h3 class="cls">Ajay</h3>
      <h4 class="cls">Anish kumar</h4>
      <hr>
     
      <!-- TAGNAME -->
       <h1>Avinash</h1>
       <h2>Akilan</h2>
       <hr>
      
       <!--GROUPING TAG(,) -->
       <p>prasanna</p>
       <h3>Arepalli</h3>
       <hr>

       <!-- UNIVERSAL SELECTOR -->
        <h4>Hello world!!!...</h4>
        <h4>Hello world!!!...</h4>
        <h4>Hello world!!!...</h4>
        <h4>Hello world!!!...</h4>
</body>
</html>
