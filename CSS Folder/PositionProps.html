<!-- 02.07.26 POSITION PROPERTY -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PositionProps</title>
    <style>
        *{
            margin: 0px;
        }

        #demo{
            height: 150px;
            width: 150px;
            border:3px solid red;
            text-align: center;
            background-color:yellow;

        }
        .cls{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            text-align: center;
        }

        #box1{
            background-color:maroon;
            
        }
        #box2{
            background-color:lightpink;
            position: relative;
            left: 200px;
        }
        #box3{
            background-color:darkorchid;
        }
        #box4{
            background-color:aquamarine;
        }


        .cl1{
            height: 150px;
            width: 150px;
            border: 2px solid black;
            text-align: center;
        }
        #dubba1{
            background-color:dodgerblue;
            
        }
        #dubba2{
            background-color:darkorange;

        }
        #dubba3{
            background-color:brown;
            position: absolute;
            left: 300px;
        }
        #dubba4{
            background-color:greenyellow;
        }


        #a1{
            height: 100px;
            width: 200px;
            
            background-color:mediumvioletred;
            
            margin-left: 0px;
         
            top: 0px;
            color: azure;
            position: fixed;
        }


        #demo7{
            height: 200px;
            width: 200px;
            border: 2px solid green;
            background-color: goldenrod;
            position: sticky;
            top: 100px;
        }
    </style>
</head>
<body>

    <!-- POSITION PROPERTIES -->

    <!-- STATIC POSITION  -->

    <h1>STATIC POSITION</h1>

    <div id="demo">Static</div>
    <h2>Hello</h2>
    <P>Hii</P>

    <hr>

    <!-- RELATIVE POSITION -->

    <h1>RELATIVE POSITION</h1>

    <div id="box1" class="cls">ONE</div>
    <div id="box2" class="cls">TWO</div>
    <div id="box3" class="cls">THREE</div>
    <div id="box4" class="cls">FOUR</div>

    <hr>

    <!-- ABSOLUTE POSITION -->

    <h1>ABSOLUTE POSITION</h1>

    <div id="dubba1" class="cl1">ONE</div>
    <div id="dubba2" class="cl1">TWO</div>
    <div id="dubba3" class="cl1">THREE</div>
    <div id="dubba4" class="cl1">FOUR</div>

    <hr>

    <!-- FIXED POSITION -->

    <div id="a1" class="c2">FIXED POSITION</div>


    <hr>

    <!-- STICKY POSITION -->

    <div id="demo7">STICKY</div>
    

    
</body>
</html>
