<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 200px;
            width: 200px;
            position: absolute;
            top: 200px;
            left:200px;

            

            transform: translate(400px,300px);
            transform: translateX(500px);
            transform: translateY(400px);


            transform: rotate(45deg);
            transform: rotate(60deg);
            transform: rotateX(60deg);
            transform: rotateY(30deg);
            transform: rotatey(30deg);

            transform: skew(15deg,30deg);
            transform: skewX(20deg);
            transform: skewY(40deg);

            transform: scale(2,2);
            transform: scaleX(5);
            transform: scaley(7);
            transform: scale(3,3);
        }

        img:hover{
            transform:scale(1,1);
            transform: scale(1,1);
            transform: scale(1,1);
        }

    </style>
</head>
<body>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0gWGH6QiXJXOYvyCtmi_fPRNWN-DGEMyQBsld2kBDiQ&s=10" alt="">
    

    
</body>
</html>
