<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Property in CSS</title>
    <style>
        div{
            height: 300px;
            width:350px;   
            border:8px solid blueviolet;
            
            /* COLOR NAME */
            background-color:deeppink;

            /* HEXA DECIMAL */
            background-color: #232465;
            background-color: #dedede;
            background-color: #a2b4c7;
            background-color: #fff;
            background-color: #000;

            /* RGB */
            background-color: rgb(122,34,95);
            background-color: rgb(70,244,40);
            background-color: rgb(55,40,99);

            /* RGBA */
            background-color:rgba(22,33,44,0.3);
            background-color: rgba(45,87,49,0.4);
            background-color: rgba(89,55,133,0.6);

            /* HSL */
            background-color:hsl(330,50%,80%);
            background-color:hsl(290,90%,45%);
            background-color: hsl(162, 93%, 64%);

            /* HSLA */
            background-color:hsla(345,60%,67%,0.6);
            background-color: hsla(298,78%,87%,0.8);
            background-color: hsla(188,68%,87%,0.9);
        }

        h1{
            color: darkred;
            color: #678954;
            color:rgb(230,68,98);
            color:rgba(34,190,78,0.8);
            color: hsl(340,56%,75%);
            color:hsla(290,67%,33%,0.9);
            color: azure;
            background-color: darkgoldenrod;
        }
    </style>
</head>

<body>
    <div></div>
    <h1>
        Heyy❤️....Hi❤️....
    </h1>
</body>
</html>
