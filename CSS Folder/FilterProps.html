<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height:200px;
            width:200px;
            position:absolute;
            top:150px;
            left:200px;
            border-radius:20px;

            filter: blur(3px);
            filter: blur(1.5px);

            filter:brightness(10);
            filter:brightness(90);

            filter: contrast(50%);
            filter: contrast(70%);

            filter:grayscale(30%);
            filter:grayscale(56%);

            filter: invert(77%);
            filter: invert(80%);
            
            filter: sepia(45%);
            filter: sepia(59%);

            filter: hue-rotate(60deg);
            filter: hue-rotate(95deg);

            filter: saturate(45%);
            filter: saturate(60%);

            filter: drop-shadow(34px 45px 0.5 red);

            filter: blur(0.1%) brightness(95) contrast(55%);


        }
    </style>
</head>
<body>
    <img src="../Html Folder/Light.jpg" alt="">
</body>
</html>
