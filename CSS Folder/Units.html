<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #demo1{
            height:160px;
            width:160px;
            background-color: maroon;
            border: 2px solid black;
        }
        #demo2{
            height:100px;
            width:50%;
            background-color:magenta;
            border: 2px solid black;
        }
        #demo3{
            height:10em;
            width:10em;
            background-color:gold;
            border: 2px solid black;
        }
        #demo4{
            height:10rem;
            width:10rem;
            background-color:aqua;
            border: 2px solid black;
        }
        #demo5{
            height:10vh;
            width:10vw;
            background-color:blueviolet;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <!-- PX -->
    <div id="demo1"></div> <hr>

    <!-- PERCENTAGE(%) -->
    <div id="demo2"></div> <hr>

    <!-- EM(ELEMENT) -->
    <div id="demo3"></div> <hr>

    <!-- REM(ROOT ELEMENT) -->
    <div id="demo4"></div> <hr>

    <!-- VH AND VM (VIEWPORT HEIGHT AND VIEWPORT WIDTH) -->
    <div id="demo5"></div> <hr>
</body>
</html>
