<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella vita Perfume Card</title>
    <style>
        *{
            margin:0;
        }
        .card{
            height:350px;
            width: 645px;
            background-color:plum;
            margin:80px;
            border:2px solid gray;
            display: flex;
            align-items:center;
        }

        .image{
            display: inline-block;
        }
        img{
            height:350px;
            width:300px;

        }
        .content{
            width:350px;
            padding:20px;
            margin:20px;
        }
        p,span{
            color: gray;
        }
        #id1{
            position: relative;
            bottom:40px;
        }
        #id2{
            position: relative;
            bottom: 20px;
        }
        #id3{
            position: relative;
            bottom: 20px;
        }
        #id4{
            position: relative;
            top: 10px;
        }
        button{
            width: 300px;
            height:50px;
            background-color:purple;
            color:white;
            position: relative;
            top:10px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <img src="https://bellavitaorganic.com/cdn/shop/files/front_fe2d4d46-d28b-497f-a0ab-cce90b3dbb40.jpg?v=1736865369&width=1000" alt="" class="image">

        <div class="content">
        <p id="id1">PERFUME</p>
        <h1 id="id2">BELLA VITA </h1> 
        <h3 id="id3">Luxury Perfume</h3>
        <p>Bella Vita is a popular Indian fragrance and beauty brand known for its affordable, travel-friendly and IFRA-certified perfumes.</p>

        <h2 id="id4">$525 <s><span>$999</span></s></h2> 

        <button>
            <i class="fas fa-cart-shopping"></i> Add to Cart
        </button>
        </div>
    </div>
</body>
</html>
