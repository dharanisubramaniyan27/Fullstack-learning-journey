<!-- 03.07.26 Z-INDEX PROPERTY -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index and Opacity</title>
    <style>
        #box1{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            background-color:deeppink;
            position: relative;
            z-index: 50;
            top: 100px;
            opacity: 0.5;

        }
        #box2{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            background-color:darkmagenta;
            position: relative;
            z-index: 60;
            left: 100px;
            opacity: 0.9;

        }
    </style>
</head>
<body>

    <!-- z-index AND OPACITY-->
     <h1>Z-INDEX AND OPACITY</h1>

    <div id="box1"></div>
    <div id="box2"></div>

    <hr>

</body>
</html>
