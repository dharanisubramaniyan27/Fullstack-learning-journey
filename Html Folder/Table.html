<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!-- Tables in html -->
     <table border="3px" cellpadding="6px" cellspacing="3px" height="500px" width="500" align="center" bgcolor="aqua">
        <tr align="center" bgcolor="pink">
            <th>Sweets</th>
            <th>Fruits</th>
            <th>Chocolates</th>
        </tr>
        <tr>
            <td align="center">Laddu</td>
            <td>Apple</td>
            <td rowspan="3">Kitkat</td>
        </tr>
        <tr>
            <td colspan="2">Jilebi</td>
            <!-- <td align="center">Orange</td> -->
            <!-- <td>Dairy Milk</td> -->
        </tr>
        <tr>
            <td>Gulab Jamun</td>
            <td>Mango</td>
            <!-- <td align="center">Snickers</td> -->
        </tr>
     </table>
</body>
</html>
