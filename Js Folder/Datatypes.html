<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //PRIMITIVE DATATYPES....

        //STRING
        let a="Dinga"
        console.log(a)
        console.log(typeof a)

        //NUMBER
        let b=100
        console.log(b)
        console.log(typeof b)

        //BOOLEAN
        let c=true
        console.log(c)
        console.log(typeof c)

        //BIGINT
        let d=20n
        console.log(d)
        console.log(typeof d)

        //UNDEFINED
        let e=undefined
        console.log(e)
        console.log(typeof e)

        //NULL
        let f=null
        console.log(f)
        console.log(typeof f)

        //SYMBOL
        let g=Symbol()
        console.log(g)
        console.log(typeof g)


        //NON-PRIMITIVE DATATYPES

        //ARRAY
        let arr=["Raja","Dinga","Chintu","Mintu","Bittu"]
        console.log(arr)
        console.log(typeof arr)

        //OBJECT
        let obj={
            name:"Dharani",
            age:21,
            city:"Chennai",
            Country:"India"
        }
        console.log(obj)
        console.log(typeof obj)
    </script>
</body>
</html>
