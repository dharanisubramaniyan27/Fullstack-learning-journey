<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //OPERATORS

        //ARITHMETIC 
        let a=100;
        let b=50;
        console.log(a+b)
        console.log(a-b)
        console.log(a*b)
        console.log(a/b)
        console.log(a%b)

        a=3;
        b=2;
        console.log(a*b)
        console.log(a**b)

        //COMPARSION or RELATIONAL 
        let m=80;
        let n=40;
        console.log(m>n)
        console.log(n<m)
        console.log(n==m)
        console.log(n!=m)
        console.log(n<=m)
    </script>
</body>
</html>
